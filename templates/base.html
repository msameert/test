<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="header-nav">
            <div class="brand">
                <span class="app-title">LMS Admin</span>
            </div>
            <div class="nav-right">
                <span class="username">Logged in as {{ session.get('username', 'Guest') }}</span>
                <a href="{{ url_for('logout') }}" class="logout-button">Logout</a>
            </div>
        </div>
    </header>

    <main>
        <div class="page-wrapper">
            {% block body %}
            {% endblock %}
        </div>
    </main>

    <footer>
        © LMS 2026
    </footer>
</body>
</html>
